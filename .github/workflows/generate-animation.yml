name: generate animation

on:
  schedule:
  #   - cron: "0 0 * * 1"    # run automatically every week, Monday
      - cron: "* * * * *"  # Runs every minute
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches:
    - master
    
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: checkout
        uses: actions/checkout@master
        with:
          ref: master
          
      # generates a snake game from a github user contributions graph, output a svg animation
      - name: generate grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DinethShakya23
          color_snake: "#0000FF"
          
          outputs: |
            dist/grid-snake.svg
            dist/grid-snake-dark.svg?palette=github-dark
      
      - name: Commit and push the animation 
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add --all
          git commit -m "New SVGs were generated" || echo "No changes"
          git push

